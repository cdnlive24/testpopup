<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

/* video */
video{
    width:100%;
    max-width:900px;
}

/* overlay glass */
#popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index:9999;
}

/* glass box */
.box{
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);
    padding:22px;
    border-radius:14px;
    text-align:center;
    width:300px;
    color:#fff;
    font-family:Arial;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

.box p{
    font-size:14px;
    margin-bottom:15px;
    line-height:1.4;
}

.box button{
    padding:10px 20px;
    border:none;
    background:#fff;
    color:#000;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="video" controls>
    <source src="https://cdn.aceimg.com/RuPUbivq0.mp4" type="video/mp4">
</video>

<!-- POPUP -->
<div id="popup">
    <div class="box">
        <p>
            This content may contain content that may be uncomfortable. Do you want to continue?
        </p>
        <button onclick="goAds()">OK</button>
    </div>
</div>

<script>
const popup = document.getElementById("popup");
const video = document.getElementById("video");
const adsLink = "https://rungbeacon.com/kv6znkh4tf?key=89df005e4788b41190db6cf343253b58";

/* ⛔ LOCK VIDEO */
video.pause();
video.controls = false;

/* auto pause safety */
video.addEventListener("play", () => {
    if(popup.style.display !== "none"){
        video.pause();
    }
});

/* popup tetap tampil di awal */
window.addEventListener("load", () => {
    setTimeout(() => {
        popup.style.display = "flex";
        video.pause();
    }, 3000);
});

/* klik OK */
function goAds(){
    popup.style.display = "none";

    // unlock video
    video.controls = true;

    // redirect ke iklan
    window.location.href = adsLink;
}
</script>
